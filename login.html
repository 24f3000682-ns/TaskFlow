<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow | Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="login-box">

        <h1>TaskFlow</h1>

        <p class="subtitle">
            Organize your work efficiently.
        </p>

        <form id="loginForm">

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <p class="demo">

            Demo Login

            <br><br>

            Email:
            admin@taskflow.com

            <br>

            Password:
            123456

        </p>

    </div>

<script src="js/auth.js"></script>

</body>

</html>
